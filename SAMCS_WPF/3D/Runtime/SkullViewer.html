<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <title>Skull Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            background: #1a1a2e;
        }

        canvas {
            display: block;
        }

        /* ---------- 左上角双面板 ---------- */
        #top-left-panels {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 10;
            display: flex;
            gap: 6px;
            user-select: none;
            -webkit-user-select: none;
        }

        .tl-panel {
            display: flex;
            flex-direction: column;
        }

        .tl-toggle {
            height: 26px;
            padding: 0 10px;
            background: rgba(30, 30, 46, 0.88);
            color: #CCCCCC;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Microsoft YaHei', sans-serif;
            white-space: nowrap;
        }

        .tl-toggle:hover {
            background: rgba(50, 50, 70, 0.92);
            color: #FFFFFF;
        }

        .tl-body {
            display: none;
            margin-top: 4px;
            padding: 8px 10px;
            background: rgba(30, 30, 46, 0.90);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .tl-body.open {
            display: block;
        }

        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }

        .ctrl-row:last-child {
            margin-bottom: 0;
        }

        .pose-label {
            color: #8899AA;
            font-size: 11px;
            font-family: 'Microsoft YaHei', sans-serif;
            width: 24px;
            text-align: right;
        }

        .pose-input {
            width: 56px;
            height: 26px;
            background: #2A2A3E;
            color: #FFFFFF;
            border: none;
            border-radius: 3px;
            text-align: center;
            font-size: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            outline: none;
        }

        .pose-input:focus {
            outline: 1px solid #3A6BD0;
        }

        .pose-step-wrap {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .pose-step-btn {
            width: 16px;
            height: 13px;
            background: #3A3A50;
            color: #CCCCCC;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 7px;
            line-height: 1;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pose-step-btn:hover {
            background: #4A4A60;
            color: #FFFFFF;
        }

        .pose-step-btn:active {
            background: #5A5A70;
        }

        .ctrl-unit {
            color: #889999;
            font-size: 10px;
            width: 18px;
        }

        #pose-apply {
            height: 28px;
            padding: 0 16px;
            background: #3A6BD0;
            color: #FFFFFF;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        #pose-apply:hover {
            background: #4A7BE0;
        }

        #pose-apply:active {
            background: #2A5BC0;
        }

        /* ---------- 面板内通用按钮 ---------- */
        .btn-tool {
            height: 28px;
            padding: 0 12px;
            background: #3A3A50;
            color: #CCCCCC;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .btn-tool:hover {
            background: #4A4A60;
            color: #FFFFFF;
        }

        .btn-danger {
            height: 28px;
            padding: 0 12px;
            background: #8B3A3A;
            color: #FFFFFF;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .btn-danger:hover {
            background: #A04040;
        }

        .btn-danger.done {
            background: #5A8A3A;
        }

        /* ---------- 底部图例（纵向排列） ---------- */
        #legend-container {
            position: absolute;
            bottom: 6px;
            left: 6px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 5px;
            user-select: none;
            -webkit-user-select: none;
        }

        .legend-box {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 5px 12px;
            /* 【可调参数】图例框统一宽度 */
            width: 75px;
            background: rgba(20, 20, 35, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-family: 'Microsoft YaHei', sans-serif;
            color: #BBBBCC;
            height: 16px;
            line-height: 16px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-axis-arrow {
            flex-shrink: 0;
        }

        /* ---------- 面板内复用样式 ---------- */
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
            height: 20px;
        }

        .toggle-row label {
            color: #BBBBCC;
            font-size: 11px;
            font-family: 'Microsoft YaHei', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toggle-row input[type="checkbox"] {
            accent-color: #00CC66;
            cursor: pointer;
        }

        .panel-sep {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin: 6px 0;
        }

        .sc-row {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 3px;
        }

        .slider-label {
            color: #8899AA;
            font-size: 11px;
            font-family: 'Microsoft YaHei', sans-serif;
            margin-bottom: 2px;
        }

        .sc-row input[type="range"] {
            width: 72px;
            height: 3px;
            accent-color: #00CC66;
            cursor: pointer;
        }

        .sc-val {
            min-width: 34px;
            text-align: center;
            color: #E0E0E0;
            font-size: 11px;
            font-family: 'Consolas', monospace;
            padding: 1px 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div id="viewport">
        <!--  左上角双面板  -->
        <div id="top-left-panels">
            <!--  面板一：显示与调节  -->
            <div class="tl-panel">
                <button class="tl-toggle" data-target="disp-body">+ 设置</button>
                <div class="tl-body" id="disp-body">
                    <div class="toggle-row">
                        <label><input type="checkbox" id="chk-markers" checked style="accent-color:#E91E63;" />
                            五点标记</label>
                    </div>
                    <div class="toggle-row">
                        <label><input type="checkbox" id="chk-axes" checked style="accent-color:#00CC66;" />
                            AP/ML/DV轴</label>
                    </div>
                    <div class="toggle-row">
                        <label><input type="checkbox" id="chk-grid" checked style="accent-color:#8899AA;" /> 栅格</label>
                    </div>
                    <hr class="panel-sep" />
                    <div class="slider-label">透明度</div>
                    <div class="sc-row">
                        <input type="range" id="opacity-slider" min="10" max="100" value="20" />
                        <span class="sc-val" id="opacity-value">0.20</span>
                    </div>
                    <div class="slider-label">B-L (mm)</div>
                    <div class="sc-row">
                        <input type="range" id="bl-slider" min="3.0" max="6.0" step="0.01" value="4.1" />
                        <span class="sc-val" id="bl-value">4.10</span>
                    </div>
                    <hr class="panel-sep" />
                    <div class="ctrl-row">
                        <button id="btn-craniotomy" class="btn-danger">颅骨开窗</button>
                    </div>
                    <div class="ctrl-row">
                        <button id="btn-refresh" class="btn-tool">刷新页面</button>
                    </div>
                </div>
            </div>
            <!--  面板二：位姿控制  -->
            <div class="tl-panel">
                <button class="tl-toggle" data-target="pose-body">+ 位姿控制</button>
                <div class="tl-body" id="pose-body">
                    <div class="ctrl-row">
                        <span class="pose-label">Rot</span>
                        <input class="pose-input" id="pose-rot" type="text" value="0.000" />
                        <div class="pose-step-wrap">
                            <button class="pose-step-btn" data-param="rot" data-delta="1">▲</button>
                            <button class="pose-step-btn" data-param="rot" data-delta="-1">▼</button>
                        </div>
                        <span class="ctrl-unit">°</span>
                    </div>
                    <div class="ctrl-row">
                        <span class="pose-label">Pit</span>
                        <input class="pose-input" id="pose-pitch" type="text" value="90.000" />
                        <div class="pose-step-wrap">
                            <button class="pose-step-btn" data-param="pitch" data-delta="1">▲</button>
                            <button class="pose-step-btn" data-param="pitch" data-delta="-1">▼</button>
                        </div>
                        <span class="ctrl-unit">°</span>
                    </div>
                    <div class="ctrl-row">
                        <span class="pose-label">AP</span>
                        <input class="pose-input" id="pose-ap" type="text" value="0.000" />
                        <div class="pose-step-wrap">
                            <button class="pose-step-btn" data-param="ap" data-delta="0.1">▲</button>
                            <button class="pose-step-btn" data-param="ap" data-delta="-0.1">▼</button>
                        </div>
                        <span class="ctrl-unit">mm</span>
                    </div>
                    <div class="ctrl-row">
                        <span class="pose-label">ML</span>
                        <input class="pose-input" id="pose-ml" type="text" value="0.000" />
                        <div class="pose-step-wrap">
                            <button class="pose-step-btn" data-param="ml" data-delta="0.1">▲</button>
                            <button class="pose-step-btn" data-param="ml" data-delta="-0.1">▼</button>
                        </div>
                        <span class="ctrl-unit">mm</span>
                    </div>
                    <div class="ctrl-row">
                        <span class="pose-label">DV</span>
                        <input class="pose-input" id="pose-dv" type="text" value="0.000" />
                        <div class="pose-step-wrap">
                            <button class="pose-step-btn" data-param="dv" data-delta="0.1">▲</button>
                            <button class="pose-step-btn" data-param="dv" data-delta="-0.1">▼</button>
                        </div>
                        <span class="ctrl-unit">mm</span>
                    </div>
                    <div class="ctrl-row">
                        <span class="pose-label"></span>
                        <button id="pose-apply">应用</button>
                    </div>
                </div>
            </div>
        </div>

        <!--  底部图例（纵向排列）  -->
        <div id="legend-container">
            <div class="legend-box" id="legend-markers-box">
                <div class="legend-item"><span class="legend-dot" style="background:#E91E63;"></span>Bregma</div>
                <div class="legend-item"><span class="legend-dot" style="background:#00BCD4;"></span>Lambda</div>
                <div class="legend-item"><span class="legend-dot" style="background:#FFC107;"></span>Midpoint</div>
                <div class="legend-item"><span class="legend-dot" style="background:#4CAF50;"></span>MidLeft</div>
                <div class="legend-item"><span class="legend-dot" style="background:#FF5722;"></span>MidRight</div>
            </div>
            <div class="legend-box" id="legend-axes-box">
                <div class="legend-item">
                    <svg class="legend-axis-arrow" width="28" height="12" viewBox="0 0 28 12">
                        <line x1="2" y1="6" x2="22" y2="6" stroke="#00CC66" stroke-width="1.8" />
                        <polygon points="28,6 20,2 20,10" fill="#00CC66" />
                    </svg>
                    AP
                </div>
                <div class="legend-item">
                    <svg class="legend-axis-arrow" width="28" height="12" viewBox="0 0 28 12">
                        <line x1="2" y1="6" x2="22" y2="6" stroke="#FF3333" stroke-width="1.8" />
                        <polygon points="28,6 20,2 20,10" fill="#FF3333" />
                    </svg>
                    ML
                </div>
                <div class="legend-item">
                    <svg class="legend-axis-arrow" width="28" height="12" viewBox="0 0 28 12">
                        <line x1="2" y1="6" x2="22" y2="6" stroke="#3388FF" stroke-width="1.8" />
                        <polygon points="28,6 20,2 20,10" fill="#3388FF" />
                    </svg>
                    DV
                </div>
            </div>
        </div>

    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "./js/three.module.min.js",
                "three/examples/jsm/controls/OrbitControls.js": "./js/OrbitControls.js",
                "three/examples/jsm/loaders/GLTFLoader.js": "./js/GLTFLoader.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';

        // ====== 可调参数汇总（按需搜索关键字跳转） ======
        //   渲染器    → 搜索 "1. 渲染器"
        //   摄像机    → 搜索 "2. 摄像机"
        //   光照      → 搜索 "3. 布光" / "fillIntensity"
        //   底座      → 搜索 "4. 立体底座"
        //   颅骨材质  → 搜索 "SKULL_COLOR"
        //   标记球    → 搜索 "markerConfigs"
        //   定位针    → 搜索 "_createNeedleModel"
        //   坐标轴    → 搜索 "_createAxesGroup"
        //   颅骨切除  → 搜索 "craniotomyCut"
        //   步进按钮  → 搜索 "data-delta" (HTML 中)

        // ===================== 1. 渲染器 =====================
        const viewport = document.getElementById('viewport');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        viewport.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xBADDFC);
        scene.fog = new THREE.Fog(0x5ba0d0, 4, 14);

        // ===================== 2. 摄像机 =====================
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.set(0, 2, 1.5);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 3.2;
        controls.target.set(0, 0, 0);
        controls.minPolarAngle = 0.05;  // 避免完全俯视导致的 gimbal lock 和交互异常
        controls.maxPolarAngle = 1.5; // 避免完全仰视导致的 gimbal lock 和交互异常
        controls.enabled = true;      // 允许鼠标交互
        controls.enablePan = false;   // 禁止拖动平移，仅允许旋转+缩放
        controls.update();

        // ===================== 3. 布光 =====================
        // 半球光：天空冷白 + 地面浅肉色，暗部模拟组织漫反射反光
        scene.add(new THREE.HemisphereLight(0xffffff, 0xebd9d3, 0.5));

        const keyLight = new THREE.DirectionalLight(0xffffff, 3.5);
        keyLight.position.set(0, 6, 0);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(1024, 1024);
        keyLight.shadow.camera.near = 0.1;
        keyLight.shadow.camera.far = 20;
        keyLight.shadow.camera.left = -2;
        keyLight.shadow.camera.right = 2;
        keyLight.shadow.camera.top = 2;
        keyLight.shadow.camera.bottom = -2;
        keyLight.shadow.bias = -0.0003;
        scene.add(keyLight);

        // ===================== 4. 立体底座 =====================
        // 实心圆柱，阳极氧化铝质感
        // 【可调参数】底座顶半径/底半径(m) / 高度(m) / 颜色
        const BASE_R_TOP = 0.82, BASE_R_BOT = 0.86, BASE_H = 0.04, BASE_Y = -0.50;
        const BASE_COLOR = 0x808080;

        const pedestal = new THREE.Mesh(
            new THREE.CylinderGeometry(BASE_R_TOP, BASE_R_BOT, BASE_H, 64),
            new THREE.MeshStandardMaterial({ color: BASE_COLOR, roughness: 0.55, metalness: 0.35 })
        );
        pedestal.position.y = BASE_Y;
        pedestal.receiveShadow = true;
        pedestal.castShadow = true;
        scene.add(pedestal);

        // ===================== 5. 控制台中继到 C# =====================
        // 劫持 console 方法，通过 postMessage 发送到 C# Debug 输出
        const _log = console.log.bind(console);
        const _err = console.error.bind(console);
        const _warn = console.warn.bind(console);

        function postMsg(level, args) {
            try {
                window.chrome.webview.postMessage(JSON.stringify({
                    level: level,
                    text: Array.from(args).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')
                }));
            } catch (e) { /* 忽略序列化错误 */ }
        }

        console.log = function () { _log.apply(null, arguments); postMsg('log', arguments); };
        console.error = function () { _err.apply(null, arguments); postMsg('error', arguments); };
        console.warn = function () { _warn.apply(null, arguments); postMsg('warn', arguments); };

        // 全局 JS 异常捕获
        window.addEventListener('error', function (e) {
            console.error('全局异常: ' + e.message + ' @ ' + e.filename + ':' + e.lineno);
        });

        // ===================== 6. 加载 GLB 模型 =====================
        // 【可调参数】模型在场景中的目标显示尺寸（单位：米）
        // 加载后会根据包围盒最大边自动等比缩放，使模型恰好适配此尺寸
        // 调小 = 模型缩小，调大 = 模型放大
        const MODEL_TARGET_SIZE = 1.0;

        let _skullModel = null;
        let _modelLoaded = false;
        let _initialScale = 1.0;
        let _boxCenter = null;
        let _boxSize = null;
        let _markerNodes = [];
        let _markerSpheres = [];
        let _markerRings = [];              // 标记点外围光环
        let _needleGroup = null;
        let _axesGroup = null;              // 坐标轴 (AP/ML/DV 三轴 + 刻度齿)
        let _gridGroup = null;              // 栅格 (AP-ML 平面线)
        let _axisBaseScale = 1.0;           // 坐标系创建时的 _mmToWorldScale，供缩放用
        let _blDistance = 4.1;              // 当前 B-L 设定距离(mm)，随缩放变更
        let _mmToWorldScale = 0.001;        // mm→世界米 换算系数（= B-L世界距 / _blDistance）
        let _cameraLockedToNeedle = false;  // 相机是否跟随针尖
        let _apDir = new THREE.Vector3();  // AP 轴方向（前），从标记点动态计算
        let _mlDir = new THREE.Vector3();  // ML 轴方向（右），从标记点动态计算
        let _dvDir = new THREE.Vector3();  // DV 轴方向（腹），cross(AP, ML) 正交得出
        // DOM 缓存：位姿输入框，_initPoseBar 中初始化
        let _elAp = null, _elMl = null, _elDv = null, _elRot = null, _elPit = null;
        const loader = new GLTFLoader();

        // 自动检测运行环境：WebView2 用虚拟主机，普通浏览器用相对路径
        const isWebView2 = typeof window.chrome !== 'undefined' && window.chrome.webview !== undefined;
        const modelUrl = isWebView2
            ? 'https://samcs-model.local/MouseSkull_4.21mm.glb'
            : '../Model/MouseSkull_4.21mm.glb';
        console.log('运行环境: ' + (isWebView2 ? 'WebView2' : '浏览器调试') + ' URL=' + modelUrl);

        loader.load(modelUrl,
            (gltf) => {
                console.log('GLB 加载完成，场景子节点数=' + gltf.scene.children.length);
                _skullModel = gltf.scene;
                _modelLoaded = true;

                // 【可调参数】颅骨 PBR 材质：方案一 标准干骨质感
                const SKULL_COLOR = 0xe6e2d6;   // 骨白色（偏暖象牙色）
                const SKULL_METALNESS = 0.0;        // 骨骼绝缘体，零金属感
                const SKULL_ROUGHNESS = 0.65;       // 微糙表面，漫反射强

                _skullModel.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // 关闭顶点色，否则 material.color 不生效
                        if (child.material.vertexColors !== undefined) {
                            child.material.vertexColors = false;
                        }
                        child.material.color = new THREE.Color(SKULL_COLOR);
                        child.material.metalness = SKULL_METALNESS;
                        child.material.roughness = SKULL_ROUGHNESS;
                        child.material.side = THREE.DoubleSide;  // 颅骨内部可见
                        console.log('  Mesh: ' + (child.name || '(未命名)'));
                    }
                });

                // 用包围盒自动计算模型尺寸和位置
                const box = new THREE.Box3().setFromObject(_skullModel);
                const size = new THREE.Vector3();
                box.getSize(size);
                const center = new THREE.Vector3();
                box.getCenter(center);
                // 保存为全局变量，供后续缩放操作使用
                _boxSize = size.clone();
                _boxCenter = center.clone();
                console.log('包围盒: 尺寸=(' + size.x.toFixed(3) + ', ' + size.y.toFixed(3) + ', ' + size.z.toFixed(3) + ')'
                    + ' 中心=(' + center.x.toFixed(3) + ', ' + center.y.toFixed(3) + ', ' + center.z.toFixed(3) + ')');

                // 【可调参数】地面高度，与底座台面 Y 保持一致
                const GROUND_Y = -0.3;
                // 自动缩放：以包围盒最大边为基准，等比缩放至目标尺寸
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = MODEL_TARGET_SIZE / maxDim;
                _initialScale = scale;  // 保存初始缩放值，供 resetSkullScale 使用
                _skullModel.scale.setScalar(scale);
                console.log('自动缩放: 最大边=' + maxDim.toFixed(3) + ' → 目标=' + MODEL_TARGET_SIZE.toFixed(3) + ' 比例=' + scale.toFixed(4));

                // 自动放置：XZ 居中，Y 贴地（模型底部对齐地面）
                // Three.js 变换顺序：先缩放再平移，所以 world_y = position.y + scale * local_y
                // 贴地公式：position.y = GROUND_Y - scale * center.y + scale * size.y / 2
                _skullModel.position.set(
                    -scale * center.x,
                    GROUND_Y - scale * center.y + scale * size.y / 2,
                    -scale * center.z
                );
                console.log('贴地放置: 位置=(' + _skullModel.position.x.toFixed(3) + ', ' + _skullModel.position.y.toFixed(3) + ', ' + _skullModel.position.z.toFixed(3) + ')');

                scene.add(_skullModel);

                // ====== 颅骨解剖标记点渲染 ======
                // 【可调参数 — 所有尺寸单位均为 mm】
                //   radius    → 球半径(mm), 全部统一 9.5
                //   color     → 表面颜色(0xRRGGBB, 五色区分)
                //   roughness → 粗糙度(0=镜面, 1=磨砂)
                //   metalness → 金属度(0=塑料, 1=金属)
                const markerConfigs = [
                    // Point_1_Bregma — 前囟（基准原点）品红
                    { name: 'Point_1_Bregma', radius: 7, color: 0xE91E63, emissive: 0x2D000D, roughness: 0.25, metalness: 0.15 },
                    // Point_2_Lambda — 人字缝（后囟）青色
                    { name: 'Point_2_Lambda', radius: 7, color: 0x00BCD4, emissive: 0x001B20, roughness: 0.25, metalness: 0.15 },
                    // Point_3_Midpoint — 前后囟中点 琥珀
                    { name: 'Point_3_Midpoint', radius: 7, color: 0xFFC107, emissive: 0x2D1E00, roughness: 0.25, metalness: 0.15 },
                    // Point_4_MidLeft — 左侧中点 翠绿
                    { name: 'Point_4_MidLeft', radius: 7, color: 0x4CAF50, emissive: 0x0A1C0B, roughness: 0.25, metalness: 0.15 },
                    // Point_5_MidRight — 右侧中点 橙红
                    { name: 'Point_5_MidRight', radius: 7, color: 0xFF5722, emissive: 0x2D0C00, roughness: 0.25, metalness: 0.15 }
                ];

                for (let i = 0; i < markerConfigs.length; i++) {
                    const cfg = markerConfigs[i];
                    const pointNode = _skullModel.getObjectByName(cfg.name);
                    if (pointNode) {
                        // 球放在场景根下，用世界坐标定位，不受颅骨缩放影响
                        const worldPos = new THREE.Vector3();
                        pointNode.getWorldPosition(worldPos);

                        // ---- 内核实心球 ----
                        const radiusM = cfg.radius / 1000.0;  // mm 转 米
                        const geom = new THREE.SphereGeometry(radiusM, 32, 32);
                        const mat = new THREE.MeshStandardMaterial({
                            color: cfg.color,
                            roughness: cfg.roughness,
                            metalness: cfg.metalness,
                            emissive: cfg.emissive,
                            emissiveIntensity: 0.4
                        });
                        const sphere = new THREE.Mesh(geom, mat);
                        // 将标记球略抬离颅骨表面（+Y 偏移），防止嵌在网格内被深度测试遮挡
                        // 【可调参数】markerYOffset → 抬升高度(世界米)
                        const markerYOffset = 0.008;
                        sphere.position.set(worldPos.x, worldPos.y + markerYOffset, worldPos.z);
                        sphere.castShadow = true;
                        sphere.renderOrder = 1;
                        sphere.material.depthTest = true;
                        sphere.material.depthWrite = true;
                        scene.add(sphere);

                        // ---- 外围光环（Torus，平放在颅骨表面 XZ 平面） ----
                        const ringRadius = 0.4 * _mmToWorldScale;  // 光环半径 0.4mm
                        const tubeRadius = 0.015 * _mmToWorldScale;  // 管径 0.015mm
                        const ringGeom = new THREE.TorusGeometry(ringRadius, tubeRadius, 16, 48);
                        ringGeom.rotateX(Math.PI / 2);  // Torus 默认在 XY 面，旋转到 XZ 面
                        const ringMat = new THREE.MeshStandardMaterial({
                            color: cfg.color,
                            roughness: 0.2,
                            metalness: 0.05,
                            emissive: cfg.color,
                            emissiveIntensity: 0.6,
                            transparent: true,
                            opacity: 0.85,
                            depthTest: true,
                            depthWrite: false
                        });
                        const ring = new THREE.Mesh(ringGeom, ringMat);
                        ring.position.set(worldPos.x, worldPos.y + markerYOffset, worldPos.z);
                        ring.renderOrder = 0;
                        scene.add(ring);

                        // 保存引用
                        _markerNodes.push(pointNode);
                        _markerSpheres.push(sphere);
                        _markerRings.push(ring);
                        console.log('标记点 ' + cfg.name + ': 世界坐标=('
                            + worldPos.x.toFixed(3) + ', ' + worldPos.y.toFixed(3) + ', ' + worldPos.z.toFixed(3) + ')');
                    }
                }

                // 创建定位针模型
                _needleGroup = _createNeedleModel();
                // 初始位置设到 Bregma 点
                if (_markerSpheres.length > 0) {
                    _needleGroup.position.copy(_markerSpheres[0].position);
                }
                scene.add(_needleGroup);

                // 根据已创建的标记球，计算 mm→世界米 的真实换算系数
                // Bregma(索引0) 和 Lambda(索引1) 在 GLB 中相距 4.21mm
                if (_markerSpheres.length >= 2) {
                    var worldDist = _markerSpheres[0].position.distanceTo(_markerSpheres[1].position);
                    _mmToWorldScale = worldDist / _blDistance;
                    console.log('换算系数: 1mm = ' + _mmToWorldScale.toFixed(6) + ' 世界米 (B-L世界距='
                        + worldDist.toFixed(3) + 'm / ' + _blDistance.toFixed(2) + 'mm)');
                }

                // 初始化 UI 控制（必须在创建坐标系之前，确保面板可用）
                _initPoseBar();

                // 从标记点计算真实解剖方向
                _computeAnatomicalAxes();

                // 脑立体坐标系：以前囟为原点，三色轴标注 AP / ML / DV
                try {
                    _axesGroup = _createAxesGroup();
                    _gridGroup = _createGridGroup();
                    scene.add(_axesGroup);
                    scene.add(_gridGroup);
                } catch (e) {
                    console.error('坐标系创建失败: ' + e.message);
                }

                // 设置默认透明度 0.2（模型加载完成后自动应用）
                window.setSkullOpacity(0.2);
            },
            (progress) => {
                if (progress.total > 0) {
                    const pct = Math.round(progress.loaded / progress.total * 100);
                    console.log('加载进度: ' + pct + '%');
                }
            },
            (err) => console.error('GLB 加载失败: ' + (err.message || err))
        );

        // ===================== 7A. C# 调用接口（透明度/缩放/定位针/颅骨切除） =====================

        // 获取模型基本信息
        window.getModelInfo = () => JSON.stringify({
            loaded: _modelLoaded,
            meshCount: _skullModel ? _skullModel.children.length : 0
        });

        // ---------- 颅骨透明度 ----------

        // 设置颅骨透明度，value 范围 0.1~1.0
        window.setSkullOpacity = (value) => {
            if (!_modelLoaded) {
                return JSON.stringify({ ok: false, error: '模型尚未加载' });
            }
            var opacity = parseFloat(value);
            if (isNaN(opacity)) opacity = 1.0;  // 默认值
            if (opacity < 0.1) opacity = 0.1;
            if (opacity > 1.0) opacity = 1.0;

            _skullModel.traverse(function (child) {
                if (child.isMesh) {
                    child.material.transparent = opacity < 1.0;
                    child.material.opacity = opacity;
                    child.material.depthWrite = opacity >= 0.99;
                    child.material.needsUpdate = true;
                }
            });

            // 同步更新 DOM 滑块
            var slider = document.getElementById('opacity-slider');
            if (slider) {
                slider.value = Math.round(opacity * 100);
            }
            var label = document.getElementById('opacity-value');
            if (label) {
                label.textContent = opacity.toFixed(2);
            }

            console.log('颅骨透明度: ' + opacity.toFixed(2));
            return JSON.stringify({ ok: true, opacity: opacity });
        };

        // ---------- 颅骨缩放 ----------

        // 根据实测 Bregma-Lambda 距离缩放颅骨模型
        // realDistanceMM: 真实小鼠前后囟距离，单位毫米（默认 4.21）
        // 缩放逻辑：scaleFactor = realDistanceMM / 4.21 → _skullModel.scale = _initialScale * scaleFactor
        // 坐标系、标记球、光环位置通过 _updateAllMarkerPositions 自动同步
        window.setBregmaLambdaDistance = (realDistanceMM) => {
            if (!_modelLoaded) {
                return JSON.stringify({ ok: false, error: '模型尚未加载' });
            }

            _blDistance = realDistanceMM;      // 更新当前 B-L 设定
            var ratio = realDistanceMM / 4.21;  // 以模型内置 4.21mm 为基准
            var newScale = _initialScale * ratio;
            _skullModel.scale.setScalar(newScale);

            // 重新贴地（位置依赖 scale）
            var GROUND_Y = -0.3;  // 立体底座台面高度，与初始加载保持一致
            _skullModel.position.set(
                -newScale * _boxCenter.x,
                GROUND_Y - newScale * _boxCenter.y + newScale * _boxSize.y / 2,
                -newScale * _boxCenter.z
            );

            // 更新标记球、光环、坐标系原点、_mmToWorldScale
            _updateAllMarkerPositions();

            // 同步更新 B-L 滑块显示
            var blSlider = document.getElementById('bl-slider');
            if (blSlider) {
                blSlider.value = realDistanceMM;
            }
            var blLabel = document.getElementById('bl-value');
            if (blLabel) {
                blLabel.textContent = realDistanceMM.toFixed(2);
            }

            console.log('颅骨缩放: B-L=' + realDistanceMM.toFixed(2) + 'mm, ratio=' + ratio.toFixed(4) + ', scale=' + newScale.toFixed(4));
            return JSON.stringify({ ok: true, scale: newScale, ratio: ratio });
        };

        // 恢复颅骨到初始默认缩放比例（B-L = 4.1mm）
        window.resetSkullScale = () => {
            if (!_modelLoaded) {
                console.warn('resetSkullScale: 模型尚未加载');
                return JSON.stringify({ ok: false, error: '模型尚未加载' });
            }

            console.log('resetSkullScale: 开始重置, 当前scale=' + _skullModel.scale.x.toFixed(4) + ', B-L=' + _blDistance.toFixed(2));

            _blDistance = 4.1;
            _skullModel.scale.setScalar(_initialScale);

            // 重新贴地
            var GROUND_Y = -0.3;  // 立体底座台面高度，与初始加载一致
            _skullModel.position.set(
                -_initialScale * _boxCenter.x,
                GROUND_Y - _initialScale * _boxCenter.y + _initialScale * _boxSize.y / 2,
                -_initialScale * _boxCenter.z
            );

            _updateAllMarkerPositions();

            // 同步 B-L 滑块
            var blSlider = document.getElementById('bl-slider');
            if (blSlider) blSlider.value = 4.1;
            var blLabel = document.getElementById('bl-value');
            if (blLabel) blLabel.textContent = '4.10';

            console.log('resetSkullScale: 完成, scale=' + _initialScale.toFixed(4) + ', pos=(' + _skullModel.position.x.toFixed(3) + ',' + _skullModel.position.y.toFixed(3) + ',' + _skullModel.position.z.toFixed(3) + ')');
            return JSON.stringify({ ok: true, scale: _initialScale });
        };

        // ---------- 定位针控制 ----------

        // 更新定位针尖端位置（世界坐标，单位米）
        // 当相机锁定时，同时更新轨道中心，使视角始终跟随针尖
        window.updateNeedlePosition = (x, y, z) => {
            if (_needleGroup) {
                _needleGroup.position.set(x, y, z);
            }
            if (_cameraLockedToNeedle) {
                controls.target.set(x, y, z);
            }
        };

        // 开/关相机锁定到针尖
        // 开启后，每次 updateNeedlePosition 都会自动更新轨道中心
        window.lockCameraToNeedle = (lock) => {
            _cameraLockedToNeedle = !!lock;
            // 如果开启锁定，立即把轨道中心跳到当前针尖位置
            if (_cameraLockedToNeedle && _needleGroup) {
                controls.target.copy(_needleGroup.position);
            }
            console.log('相机锁定针尖: ' + (_cameraLockedToNeedle ? '开启' : '关闭'));
        };

        // 显示/隐藏定位针
        window.setNeedleVisible = (visible) => {
            if (_needleGroup) {
                _needleGroup.visible = !!visible;
            }
        };

        // 获取定位针当前位置
        window.getNeedlePosition = () => {
            if (!_needleGroup) {
                return JSON.stringify({ x: 0, y: 0, z: 0 });
            }
            return JSON.stringify({
                x: _needleGroup.position.x,
                y: _needleGroup.position.y,
                z: _needleGroup.position.z
            });
        };

        // 以脑立体定位坐标设置针尖位姿
        // ap: 前后 (Anterior-Posterior)，单位 mm，Bregma 为 0，前方为正
        // ml: 左右 (Medial-Lateral)，单位 mm，中线为 0，右侧为正
        // dv: 背腹 (Dorsal-Ventral)，单位 mm，颅骨表面为 0，深入脑内为正
        // rotation: 绕 DV 轴旋转角，单位 度
        // pitch: 偏离 DV 轴倾角，单位 度
        window.setNeedlePose = (ap, ml, dv, rotation, pitch) => {
            if (!_needleGroup || _markerSpheres.length === 0) {
                return JSON.stringify({ ok: false, error: '模型或标记点未就绪' });
            }

            // Bregma 标记球 (索引 0) 的当前位置作为坐标原点
            var bregma = _markerSpheres[0].position;
            // 使用加载时计算的 mm→世界米 换算系数
            var S = _mmToWorldScale;

            // 世界坐标 = Bregma + ap*_apDir*S + ml*_mlDir*S + dv*_dvDir*S
            var worldX = bregma.x + ap * _apDir.x * S + ml * _mlDir.x * S + dv * _dvDir.x * S;
            var worldY = bregma.y + ap * _apDir.y * S + ml * _mlDir.y * S + dv * _dvDir.y * S;
            var worldZ = bregma.z + ap * _apDir.z * S + ml * _mlDir.z * S + dv * _dvDir.z * S;

            _needleGroup.position.set(worldX, worldY, worldZ);

            // 针杆 +Y 对齐 DV 方向，针上方 +Z 对齐 AP 方向
            // X = cross(DV, AP) = -ML，保证右手正交
            var xDir = new THREE.Vector3().crossVectors(_dvDir, _apDir).normalize();
            var m4 = new THREE.Matrix4().makeBasis(xDir, _dvDir, _apDir);
            _needleGroup.quaternion.setFromRotationMatrix(m4);
            // Pit 转换公式：- pitch - 90
            var internalPitch = -pitch - 90;
            _needleGroup.rotateOnWorldAxis(_mlDir, THREE.MathUtils.degToRad(internalPitch));
            var negDv = new THREE.Vector3().copy(_dvDir).negate();
            // Rot 转换公式：-rotation
            var internalRotation = -rotation;
            _needleGroup.rotateOnWorldAxis(negDv, THREE.MathUtils.degToRad(internalRotation));

            // 如果相机锁定针尖，同步更新轨道中心
            if (_cameraLockedToNeedle) {
                controls.target.set(worldX, worldY, worldZ);
            }

            // 同步更新 DOM 控制条输入框
            _syncPoseToDOM(ap, ml, dv, rotation, pitch);

            return JSON.stringify({ ok: true, ap: ap, ml: ml, dv: dv, rotation: rotation, pitch: pitch });
        };

        // 获取当前针尖位姿（以 Bregma 为原点的脑立体定位坐标）
        window.getNeedlePose = () => {
            if (!_needleGroup || _markerSpheres.length === 0) {
                return JSON.stringify({ ap: 0, ml: 0, dv: 0, rotation: 0, pitch: 0 });
            }

            var bregma = _markerSpheres[0].position;
            var pos = _needleGroup.position;

            // 世界坐标 → 立体定位坐标：用点积投影到三个解剖轴上
            var dx = pos.x - bregma.x;
            var dy = pos.y - bregma.y;
            var dz = pos.z - bregma.z;
            var S = _mmToWorldScale;

            var ap = (dx * _apDir.x + dy * _apDir.y + dz * _apDir.z) / S;
            var ml = (dx * _mlDir.x + dy * _mlDir.y + dz * _mlDir.z) / S;
            var dv = (dx * _dvDir.x + dy * _dvDir.y + dz * _dvDir.z) / S;

            // 从 world quaternion 反算 rotation 和 pitch
            var q = _needleGroup.quaternion;
            var dvVec = _dvDir.clone();
            var needleUp = new THREE.Vector3(0, 1, 0).applyQuaternion(q).normalize();
            var pitch = THREE.MathUtils.radToDeg(Math.acos(needleUp.dot(dvVec)));

            var rotation = 0;
            var dotAp = Math.abs(needleUp.dot(_apDir));
            if (dotAp > 0.001) {
                // 针上方向在 AP 方向的投影，估算 rotation
                var projOnAPML = needleUp.clone().addScaledVector(dvVec, -needleUp.dot(dvVec)).normalize();
                rotation = THREE.MathUtils.radToDeg(Math.atan2(
                    projOnAPML.dot(_mlDir),
                    projOnAPML.dot(_apDir)
                ));
            }

            return JSON.stringify({
                ap: parseFloat(ap.toFixed(3)),
                ml: parseFloat(ml.toFixed(3)),
                dv: parseFloat(dv.toFixed(3)),
                rotation: parseFloat(rotation.toFixed(3)),
                pitch: parseFloat(pitch.toFixed(3))
            });
        };

        // ---------- 颅骨切除 ----------

        // 在针尖位置切除直径 1.0mm 的圆形缺口
        window.craniotomyCut = () => {
            if (!_modelLoaded) {
                return JSON.stringify({ ok: false, error: '模型尚未加载' });
            }
            if (!_needleGroup) {
                return JSON.stringify({ ok: false, error: '定位针未就绪' });
            }

            // 找到颅骨 mesh
            var skullMesh = _findSkullMesh();
            if (!skullMesh) {
                return JSON.stringify({ ok: false, error: '未找到颅骨网格' });
            }

            var geom = skullMesh.geometry;
            if (!geom.index) {
                return JSON.stringify({ ok: false, error: '网格缺少索引缓冲区' });
            }

            // 针尖世界坐标 → 颅骨本地坐标
            var tipLocal = new THREE.Vector3();
            tipLocal.copy(_needleGroup.position);
            skullMesh.worldToLocal(tipLocal);

            // 切除参数：半径 0.3mm，Y 轴高度限制（只切表层，不贯穿）
            var cutRadius = 0.3 * _mmToWorldScale / _skullModel.scale.x;
            var cutHalfH = 0.4;  // Y 轴半高，限制切除深度

            console.log('颅骨切除: 针尖本地=(' + tipLocal.x.toFixed(4) + ', '
                + tipLocal.y.toFixed(4) + ', ' + tipLocal.z.toFixed(4)
                + ') 切除半径=' + cutRadius.toFixed(5));

            // 读取旧缓冲区
            var oldIndex = geom.index.array;
            var oldPos = geom.attributes.position.array;
            var oldNorm = geom.attributes.normal ? geom.attributes.normal.array : null;
            var triCount = oldIndex.length / 3;

            // 标记要保留的三角形
            var keepTri = new Uint8Array(triCount);
            var keptCount = 0;
            var removedCount = 0;

            for (var t = 0; t < triCount; t++) {
                var i0 = oldIndex[t * 3];
                var i1 = oldIndex[t * 3 + 1];
                var i2 = oldIndex[t * 3 + 2];

                // 检查三个顶点是否全在圆柱内
                var in0 = _ptInCylinder(oldPos, i0, tipLocal, cutRadius, cutHalfH);
                var in1 = _ptInCylinder(oldPos, i1, tipLocal, cutRadius, cutHalfH);
                var in2 = _ptInCylinder(oldPos, i2, tipLocal, cutRadius, cutHalfH);

                if (in0 && in1 && in2) {
                    removedCount++;
                } else {
                    keepTri[t] = 1;
                    keptCount++;
                }
            }

            if (removedCount === 0) {
                return JSON.stringify({ ok: false, error: '针尖位置无三角形可切除' });
            }

            console.log('  三角形: 保留=' + keptCount + ' 删除=' + removedCount);

            // 构建新索引（保留的三角形）
            var newIdx = new (oldIndex instanceof Uint32Array ? Uint32Array : Uint16Array)(keptCount * 3);
            var ni = 0;
            // 记录旧顶点→新顶点索引映射
            var vertexMap = new Int32Array(oldPos.length / 3);
            vertexMap.fill(-1);

            for (var tt = 0; tt < triCount; tt++) {
                if (keepTri[tt]) {
                    for (var vv = 0; vv < 3; vv++) {
                        var oldVi = oldIndex[tt * 3 + vv];
                        if (vertexMap[oldVi] === -1) {
                            vertexMap[oldVi] = -2; // 占位，后面重新编号
                        }
                        newIdx[ni++] = oldVi;
                    }
                }
            }

            // 构建顶点重映射表
            var newVertexCount = 0;
            for (var mm = 0; mm < vertexMap.length; mm++) {
                if (vertexMap[mm] === -2) {
                    vertexMap[mm] = newVertexCount++;
                }
            }

            // 更新索引
            for (var nn = 0; nn < newIdx.length; nn++) {
                newIdx[nn] = vertexMap[newIdx[nn]];
            }

            // 重建 position 数组
            var newPos = new Float32Array(newVertexCount * 3);
            for (var pp = 0; pp < vertexMap.length; pp++) {
                var nv = vertexMap[pp];
                if (nv >= 0) {
                    newPos[nv * 3] = oldPos[pp * 3];
                    newPos[nv * 3 + 1] = oldPos[pp * 3 + 1];
                    newPos[nv * 3 + 2] = oldPos[pp * 3 + 2];
                }
            }

            // 重建 normal 数组
            var newNorm = oldNorm ? new Float32Array(newVertexCount * 3) : null;
            if (newNorm) {
                for (var qq = 0; qq < vertexMap.length; qq++) {
                    var nv2 = vertexMap[qq];
                    if (nv2 >= 0) {
                        newNorm[nv2 * 3] = oldNorm[qq * 3];
                        newNorm[nv2 * 3 + 1] = oldNorm[qq * 3 + 1];
                        newNorm[nv2 * 3 + 2] = oldNorm[qq * 3 + 2];
                    }
                }
            }

            // 应用到 geometry
            geom.setIndex(new THREE.BufferAttribute(newIdx, 1));
            geom.setAttribute('position', new THREE.BufferAttribute(newPos, 3));
            if (newNorm) {
                geom.setAttribute('normal', new THREE.BufferAttribute(newNorm, 3));
            }
            geom.computeVertexNormals();

            console.log('  颅骨切除完成: ' + removedCount + ' 个三角形, 剩余顶点=' + newVertexCount);

            return JSON.stringify({
                ok: true,
                removedTriangles: removedCount,
                keptTriangles: keptCount,
                remainingVertices: newVertexCount
            });
        };

        // ===================== 7B. 面板交互（折叠/步进/复选框/按钮/滑块） =====================
        // （HTML 内部自闭环，不依赖 C#。调用链：按钮 → _stepParam → _applyPoseFromDOM → window.setNeedlePose）

        // 从 DOM 输入框读取 5 个位姿值（使用缓存引用）
        function _readPoseFromDOM() {
            var ap = parseFloat(_elAp.value);
            var ml = parseFloat(_elMl.value);
            var dv = parseFloat(_elDv.value);
            var rotation = parseFloat(_elRot.value);
            var pitch = parseFloat(_elPit.value);

            // Pit 限制在 [0, 90]
            var pitVal = isNaN(pitch) ? 0 : pitch;
            if (pitVal < 0) pitVal = 0;
            if (pitVal > 90) pitVal = 90;

            return {
                ap: isNaN(ap) ? 0 : ap,
                ml: isNaN(ml) ? 0 : ml,
                dv: isNaN(dv) ? 0 : dv,
                rotation: isNaN(rotation) ? 0 : rotation,
                pitch: pitVal
            };
        }

        // 将位姿值写回 DOM 输入框（使用缓存引用）
        function _syncPoseToDOM(ap, ml, dv, rotation, pitch) {
            if (_elAp) _elAp.value = ap.toFixed(3);
            if (_elMl) _elMl.value = ml.toFixed(3);
            if (_elDv) _elDv.value = dv.toFixed(3);
            if (_elRot) _elRot.value = rotation.toFixed(3);
            if (_elPit) _elPit.value = pitch.toFixed(3);
        }

        // 从 DOM 读取所有值，应用到 3D 定位针
        function _applyPoseFromDOM() {
            var pose = _readPoseFromDOM();
            window.setNeedlePose(pose.ap, pose.ml, pose.dv, pose.rotation, pose.pitch);
        }

        // 【步进按钮】点击时更新输入框并立即应用
        function _onStepBtnClick(e) {
            e.preventDefault();
            var param = this.getAttribute('data-param');
            var delta = parseFloat(this.getAttribute('data-delta'));
            if (isNaN(delta)) return;

            _stepParam(param, delta);
        }

        // 【步进按钮】按住不放持续步进
        let _stepTimer = null;
        function _onStepBtnDown(e) {
            e.preventDefault();
            var param = this.getAttribute('data-param');
            var delta = parseFloat(this.getAttribute('data-delta'));
            if (isNaN(delta)) return;

            _stepParam(param, delta);

            // 150ms 首次延迟，之后每 80ms 重复
            if (_stepTimer) clearInterval(_stepTimer);
            _stepTimer = setInterval(function () {
                _stepParam(param, delta);
            }, 80);
        }

        function _onStepBtnUp(e) {
            if (_stepTimer) {
                clearInterval(_stepTimer);
                _stepTimer = null;
            }
        }

        // 对单个参数累加 delta 并应用（使用缓存引用）
        function _stepParam(param, delta) {
            var el = null;
            if (param === 'ap') el = _elAp;
            else if (param === 'ml') el = _elMl;
            else if (param === 'dv') el = _elDv;
            else if (param === 'rot') el = _elRot;
            else if (param === 'pitch') el = _elPit;
            if (!el) return;

            var current = parseFloat(el.value);
            if (isNaN(current)) current = 0;
            var newVal = current + delta;
            // Pit 限制在 [0, 90]
            if (param === 'pitch') {
                if (newVal < 0) newVal = 0;
                if (newVal > 90) newVal = 90;
            }
            el.value = newVal.toFixed(3);
            _applyPoseFromDOM();
        }

        // 输入框按 Enter 键应用
        function _onInputKeyDown(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                _applyPoseFromDOM();
            }
        }

        // 模型加载完成后初始化控制面板事件
        function _initPoseBar() {
            // 缓存 DOM 元素
            _elAp = document.getElementById('pose-ap');
            _elMl = document.getElementById('pose-ml');
            _elDv = document.getElementById('pose-dv');
            _elRot = document.getElementById('pose-rot');
            _elPit = document.getElementById('pose-pitch');

            // 折叠/展开面板（通用 .tl-toggle + [data-target]）
            var toggles = document.querySelectorAll('.tl-toggle');
            for (var ti = 0; ti < toggles.length; ti++) {
                (function (btn) {
                    var targetId = btn.getAttribute('data-target');
                    var body = document.getElementById(targetId);
                    var label = btn.textContent.replace(/^[+-] /, '');
                    if (!body) return;
                    btn.addEventListener('click', function (e) {
                        e.preventDefault();
                        var isOpen = body.classList.contains('open');
                        if (isOpen) {
                            body.classList.remove('open');
                            btn.textContent = '+ ' + label;
                        } else {
                            body.classList.add('open');
                            btn.textContent = '- ' + label;
                        }
                    });
                })(toggles[ti]);
            }

            // 步进按钮事件
            var stepBtns = document.querySelectorAll('.pose-step-btn');
            for (var i = 0; i < stepBtns.length; i++) {
                var btn = stepBtns[i];
                btn.addEventListener('click', _onStepBtnClick);
                btn.addEventListener('mousedown', _onStepBtnDown);
                btn.addEventListener('mouseup', _onStepBtnUp);
                btn.addEventListener('mouseleave', _onStepBtnUp);
                btn.addEventListener('touchstart', function (e) { e.preventDefault(); _onStepBtnDown.call(this, e); });
                btn.addEventListener('touchend', _onStepBtnUp);
            }

            // 输入框 Enter 键
            var inputs = document.querySelectorAll('.pose-input');
            for (var j = 0; j < inputs.length; j++) {
                inputs[j].addEventListener('keydown', _onInputKeyDown);
            }

            // 应用按钮
            var applyBtn = document.getElementById('pose-apply');
            if (applyBtn) {
                applyBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    _applyPoseFromDOM();
                });
            }

            // ---- 复选框：Markers（3D标记球+光环+图例五点列） ----
            var chkMarkers = document.getElementById('chk-markers');
            if (chkMarkers) {
                chkMarkers.addEventListener('change', function () {
                    var vis = this.checked;
                    for (var k = 0; k < _markerSpheres.length; k++) _markerSpheres[k].visible = vis;
                    for (var r = 0; r < _markerRings.length; r++) _markerRings[r].visible = vis;
                    var box = document.getElementById('legend-markers-box');
                    if (box) box.style.display = vis ? '' : 'none';
                });
            }
            // ---- 复选框：Axes（3D坐标轴+图例轴列） ----
            var chkAxes = document.getElementById('chk-axes');
            if (chkAxes) {
                chkAxes.addEventListener('change', function () {
                    var vis = this.checked;
                    if (_axesGroup) _axesGroup.visible = vis;
                    var box = document.getElementById('legend-axes-box');
                    if (box) box.style.display = vis ? '' : 'none';
                });
            }
            // ---- 复选框：Grid（仅栅格，无图例） ----
            var chkGrid = document.getElementById('chk-grid');
            if (chkGrid) {
                chkGrid.addEventListener('change', function () {
                    if (_gridGroup) _gridGroup.visible = this.checked;
                });
            }

            // 颅骨切除按钮
            var craniotomyBtn = document.getElementById('btn-craniotomy');
            if (craniotomyBtn) {
                craniotomyBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    var result = window.craniotomyCut();
                    var res = JSON.parse(result);
                    if (res.ok) {
                        craniotomyBtn.textContent = '已切除 ' + res.removedTriangles + '△';
                        craniotomyBtn.classList.add('done');
                    } else {
                        console.warn('颅骨切除失败: ' + res.error);
                    }
                });
            }

            // 刷新按钮
            var refreshBtn = document.getElementById('btn-refresh');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    location.reload();
                });
            }

            console.log('控制面板已初始化');
        }

        // 颅骨透明度滑块事件（独立于 _initPoseBar）
        (function () {
            var opacitySlider = document.getElementById('opacity-slider');
            if (opacitySlider) {
                opacitySlider.addEventListener('input', function () {
                    var val = parseInt(this.value) / 100.0;
                    var label = document.getElementById('opacity-value');
                    if (label) label.textContent = val.toFixed(2);
                    window.setSkullOpacity(val);
                });
            }
        })();

        // B-L 距离滑块事件（独立于 _initPoseBar）
        (function () {
            var blSlider = document.getElementById('bl-slider');
            if (blSlider) {
                blSlider.addEventListener('input', function () {
                    var val = parseFloat(this.value);
                    var label = document.getElementById('bl-value');
                    if (label) label.textContent = val.toFixed(2);
                    window.setBregmaLambdaDistance(val);
                });
            }
        })();

        // _initPoseBar 在 GLB 加载回调末尾调用

        // ===================== 7C. 内部辅助（mesh查找/圆柱判断/标记同步/解剖轴/坐标轴/栅格/定位针模型） =====================
        // _findSkullMesh / _ptInCylinder → craniotomyCut 调用
        // _updateAllMarkerPositions      → 缩放 + 坐标轴同步
        // _createStereotaxicAxes         → 脑立体坐标系 + 栅格
        // _createNeedleModel             → 定位针 3D 模型

        // 从 _skullModel 中找到实际的 Mesh 子节点
        function _findSkullMesh() {
            var found = null;
            _skullModel.traverse(function (child) {
                if (child.isMesh && !found) {
                    found = child;
                }
            });
            return found;
        }

        // 判断顶点 (px,py,pz) 是否在以 (cx,cy,cz) 为中心的扁圆柱内
        // XZ 平面半径 r，Y 轴高度限制 halfH（只切表层，不贯穿颅骨）
        function _ptInCylinder(posArr, i, center, radius, halfH) {
            var dx = posArr[i * 3] - center.x;
            var dy = posArr[i * 3 + 1] - center.y;
            var dz = posArr[i * 3 + 2] - center.z;
            return (dx * dx + dz * dz) <= (radius * radius)
                && Math.abs(dy) <= halfH;
        }

        // 根据 GLB 节点当前世界坐标更新所有标记球位置 + 坐标轴原点 + 换算系数
        function _updateAllMarkerPositions() {
            for (var i = 0; i < _markerNodes.length; i++) {
                var worldPos = new THREE.Vector3();
                _markerNodes[i].getWorldPosition(worldPos);
                var yOff = 0.008;  // 【可调参数】与 markerYOffset 保持一致
                _markerSpheres[i].position.set(worldPos.x, worldPos.y + yOff, worldPos.z);
                // 同步更新光环位置
                if (i < _markerRings.length) {
                    _markerRings[i].position.set(worldPos.x, worldPos.y + yOff, worldPos.z);
                }
            }
            // 同步更新 mm→世界米 换算系数
            if (_markerSpheres.length >= 2) {
                var worldDist = _markerSpheres[0].position.distanceTo(_markerSpheres[1].position);
                _mmToWorldScale = worldDist / _blDistance;
            }
            // 同步更新脑立体坐标系：原点跟随 Bregma，方向跟随新的解剖轴
            if (_markerSpheres.length > 0) {
                _computeAnatomicalAxes();
            }
            if (_axesGroup && _markerSpheres.length > 0) {
                _axesGroup.position.copy(_markerSpheres[0].position);
                _axesGroup.scale.setScalar(_mmToWorldScale / _axisBaseScale);
            }
            if (_gridGroup && _markerSpheres.length > 0) {
                _gridGroup.position.copy(_markerSpheres[0].position);
                _gridGroup.scale.setScalar(_mmToWorldScale / _axisBaseScale);
            }
        }

        // 从标记点实际世界坐标动态计算三个正交解剖轴方向
        // _apDir: 前方（从 Lambda 指向 Bregma，即 AP 增加方向）
        // _mlDir: 右侧（从 MidLeft 指向 MidRight）
        // _dvDir: 腹侧 = cross(_apDir, _mlDir)
        // 需要至少 4 个标记点（Bregma, Lambda, MidLeft, MidRight）
        function _computeAnatomicalAxes() {
            if (_markerSpheres.length < 5) {
                // 标记点不足，回退到默认方向
                _apDir.set(0, 0, -1);
                _mlDir.set(1, 0, 0);
                _dvDir.set(0, -1, 0);
                console.log('解剖轴: 标记点不足，使用默认硬编码方向');
                return;
            }

            var bregma = _markerSpheres[0].position;    // 索引 0: Bregma
            var lambda = _markerSpheres[1].position;    // 索引 1: Lambda
            var midLeft = _markerSpheres[3].position;   // 索引 3: MidLeft
            var midRight = _markerSpheres[4].position;  // 索引 4: MidRight

            // AP 方向：从 Lambda 指向 Bregma（前方 = AP+）
            _apDir.copy(bregma).sub(lambda).normalize();

            // ML 方向：从 MidLeft 指向 MidRight（右侧 = ML+）
            _mlDir.copy(midRight).sub(midLeft).normalize();

            // DV 方向：cross(AP, ML) = 腹侧（深入脑内 = DV+）
            _dvDir.copy(_apDir).cross(_mlDir).normalize();

            // 确保 DV 方向与 AP-ML 平面严格正交
            // 重新计算 ML = cross(DV, AP)，使三个轴标准正交
            _mlDir.copy(_dvDir).cross(_apDir).normalize();

            console.log('解剖轴: AP=(' + _apDir.x.toFixed(4) + ', ' + _apDir.y.toFixed(4) + ', ' + _apDir.z.toFixed(4) + ')'
                + ' ML=(' + _mlDir.x.toFixed(4) + ', ' + _mlDir.y.toFixed(4) + ', ' + _mlDir.z.toFixed(4) + ')'
                + ' DV=(' + _dvDir.x.toFixed(4) + ', ' + _dvDir.y.toFixed(4) + ', ' + _dvDir.z.toFixed(4) + ')');
        }

        // ---- 坐标轴 Group（轴杆 + 箭头 + 刻度齿） ----
        function _createAxesGroup() {
            var group = new THREE.Group();
            group.name = 'StereotaxicAxes';
            _axisBaseScale = _mmToWorldScale;
            var W = function (mm) { return mm * _mmToWorldScale; };
            function _mat(c) { return new THREE.MeshStandardMaterial({ color: c, roughness: 0.35, metalness: 0.1 }); }

            function _makeAxis(dir, lenMM, colorHex, headHMM, headRMM) {
                var sub = new THREE.Group();
                var headH = W(headHMM), headR = W(headRMM), shaftLen = W(lenMM) - headH;
                var shaftR = headR * 0.4, mat = _mat(colorHex);
                var shaftGeom = new THREE.CylinderGeometry(shaftR, shaftR, shaftLen, 10);
                shaftGeom.translate(0, shaftLen / 2, 0);
                sub.add(new THREE.Mesh(shaftGeom, mat));
                var headGeom = new THREE.ConeGeometry(headR, headH, 12);
                headGeom.translate(0, shaftLen + headH / 2, 0);
                sub.add(new THREE.Mesh(headGeom, mat));
                var quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
                sub.setRotationFromQuaternion(quat);
                return sub;
            }

            // 【可调参数】轴长/箭头
            group.add(_makeAxis(new THREE.Vector3(0, 0, -1), 1, 0x00CC66, 0.4, 0.2));  // AP
            group.add(_makeAxis(new THREE.Vector3(1, 0, 0), 1, 0xFF3333, 0.4, 0.2));   // ML
            group.add(_makeAxis(new THREE.Vector3(0, -1, 0), 1, 0x3388FF, 0.35, 0.18)); // DV
            if (_markerSpheres.length > 0) group.position.copy(_markerSpheres[0].position);
            return group;
        }

        // ---- 栅格 Group（AP-ML 平面等间距线） ----
        function _createGridGroup() {
            var group = new THREE.Group();
            group.name = 'GridPlane';
            var W = function (mm) { return mm * _mmToWorldScale; };
            // 【可调参数】栅格
            var gridSpanMM = 6, gridStepMM = 1, gridOpacity = 0.6;
            var gridSpan = W(gridSpanMM), gridStep = W(gridStepMM);
            var steps = Math.round(gridSpan / gridStep);
            var mat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: gridOpacity, depthTest: true });
            for (var s = -steps; s <= steps; s++) {
                var offset = s * gridStep;
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-gridSpan, 0, offset), new THREE.Vector3(gridSpan, 0, offset)]), mat));
                group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(offset, 0, -gridSpan), new THREE.Vector3(offset, 0, gridSpan)]), mat));
            }
            if (_markerSpheres.length > 0) group.position.copy(_markerSpheres[0].position);
            return group;
        }

        // 创建定位针 3D 模型，返回 Group（尖端在 Group 原点）
        // 结构：金色圆锥针尖 + 同色圆柱针杆 + 红色虚线轴线
        //
        // 【可调参数 — 定位针尺寸，单位：世界米】
        //   NEEDLE_CONE_R   → 锥尖底部半径
        //   NEEDLE_CONE_H   → 锥尖高度
        //   NEEDLE_SHAFT_H  → 针杆高度
        //   NEEDLE_DASH_LEN → 虚线下延长度
        function _createNeedleModel() {
            var group = new THREE.Group();
            group.name = 'NeedleElectrode';

            var NEEDLE_CONE_R = 0.008;   // 锥尖半径（加粗）
            var NEEDLE_CONE_H = 0.10;    // 锥尖高
            var NEEDLE_SHAFT_H = 0.05;   // 针杆高
            var NEEDLE_DASH_LEN = 0.07;  // 虚线长度

            // 锥尖+针杆共用材质：亮金色，高自发光
            var needleMat = new THREE.MeshStandardMaterial({
                color: 0xffaa00,
                roughness: 0.2,
                metalness: 0.6,
                emissive: 0xffaa00,
                emissiveIntensity: 0.9
            });

            // ===== 针尖：圆锥 =====
            var tipGeom = new THREE.ConeGeometry(NEEDLE_CONE_R, NEEDLE_CONE_H, 10);
            tipGeom.rotateX(Math.PI);
            tipGeom.translate(0, NEEDLE_CONE_H / 2, 0);
            var tipMesh = new THREE.Mesh(tipGeom, needleMat);
            tipMesh.castShadow = true;
            group.add(tipMesh);

            // ===== 针杆：圆柱 =====
            var shaftGeom = new THREE.CylinderGeometry(NEEDLE_CONE_R, NEEDLE_CONE_R, NEEDLE_SHAFT_H, 10);
            shaftGeom.translate(0, NEEDLE_CONE_H + NEEDLE_SHAFT_H / 2, 0);
            var shaftMesh = new THREE.Mesh(shaftGeom, needleMat);
            shaftMesh.castShadow = true;
            group.add(shaftMesh);

            // ===== 红色虚线轴线 =====
            var dashGeom = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(0, -NEEDLE_DASH_LEN, 0)
            ]);
            var dashMat = new THREE.LineDashedMaterial({
                color: 0xFF3333,
                dashSize: 0.008,
                gapSize: 0.004
            });
            var dashLine = new THREE.Line(dashGeom, dashMat);
            dashLine.computeLineDistances();
            group.add(dashLine);

            return group;
        }

        // ===================== 8. 渲染循环 =====================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            const w = window.innerWidth, h = window.innerHeight;
            if (w === 0 || h === 0) return;
            camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h);
        });
        window.dispatchEvent(new Event('resize'));
    </script>
</body>
